<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Moments Together</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    overflow-x: clip;
}

body {
    min-height: 100%;
}

body {
    background: linear-gradient(135deg, #6b1424, #4a0d18);
    font-family: Georgia, serif;
    /* FIXED: removed overflow-x:hidden from body — it was clipping the button area.
       Rotation overflow is now handled on .memory-grid instead. */
    padding: 40px 20px 60px;
}

.memory-title {
    text-align: center;
    color: #fdf6e4;
    font-size: 3rem;
    margin-bottom: 50px;
}

.memory-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 30px;
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 10px;
}

.polaroid {
    background: white;
    padding: 12px 12px 50px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, .35);
    transition: .3s;
    border-radius: 3px;
}

.polaroid:hover {
    transform: scale(1.05) rotate(2deg);
}

.polaroid img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    object-position: top;
    display: block;
}

.polaroid span {
    display: block;
    text-align: center;
    margin-top: 15px;
    font-size: 1.5rem;
    color: #b84d65;
}

.p1 { transform: rotate(-5deg); }
.p2 { transform: rotate(4deg); }
.p3 { transform: rotate(-3deg); }
.p4 { transform: rotate(5deg); }
.p5 { transform: rotate(-4deg); }
.p6 { transform: rotate(3deg); }
.p7 { transform: rotate(-6deg); }
.p8 { transform: rotate(4deg); }

/* FIXED: button wrapper so both buttons center properly */
.btn-group {
    display: flex;
    flex-direction: row;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-top: 50px;
}

.back-btn {
    display: block;
    padding: 12px 28px;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    font-size: 1.1rem;
    background: #fdf6e4;
    color: #6b1424;
    transition: .3s;
}

.back-btn:hover {
    transform: translateY(-2px);
}

/* ── Mobile ── */
@media (max-width: 768px) {
    body {
        padding: 30px 16px 60px;
    }

    .memory-title {
        font-size: 2rem;
        margin-bottom: 30px;
    }

    .memory-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        padding: 10px 6px;
    }

    .polaroid {
        padding: 8px 8px 36px;
    }

    .polaroid img {
        height: auto;
        aspect-ratio: 3 / 4;
    }

    /* FIXED: disable rotations on mobile — they were causing hidden overflow
       that pushed buttons off screen */
    .p1, .p2, .p3, .p4,
    .p5, .p6, .p7, .p8 {
        transform: none;
    }

    .back-btn {
        padding: 10px 24px;
        font-size: 0.95rem;
    }

    .btn-group {
        margin-top: 36px;
    }
}

@media (max-width: 420px) {
    .memory-grid {
        gap: 10px;
    }
}

.music-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,.4);
    background: rgba(74,13,24,.75);
    color: white;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    transition: transform .2s;
    backdrop-filter: blur(4px);
}
.music-btn:hover { transform: scale(1.1); }
</style>
</head>
<body>

<h1 class="memory-title">Our Moments Together ♥</h1>

<div class="memory-grid">

    <div class="polaroid p1">
        <img src="pic1.jpg" alt="">
        <span>♡</span>
    </div>

    <div class="polaroid p2">
        <img src="pic2.jpg" alt="">
        <span>♡</span>
    </div>

    <div class="polaroid p3">
        <img src="pic3.jpg" alt="">
        <span>♡</span>
    </div>

    <div class="polaroid p4">
        <img src="pic4.jpg" alt="">
        <span>♡</span>
    </div>

    <div class="polaroid p5">
        <img src="pic5.jpg" alt="">
        <span>♡</span>
    </div>

    <div class="polaroid p6">
        <img src="pic6.jpg" alt="">
        <span>♡</span>
    </div>

    <div class="polaroid p7">
        <img src="pic7.jpg" alt="">
        <span>♡</span>
    </div>

    <div class="polaroid p8">
        <img src="pic8.jpg" alt="">
        <span>♡</span>
    </div>

</div>

<!-- FIXED: wrapped in .btn-group for proper centering -->
<div class="btn-group">
    <button class="back-btn" onclick="window.location.href='letter.html'">← Back to Letter</button>
    <button class="back-btn" onclick="window.location.href='reasons.html'">Next →</button>
</div>

<audio id="bgMusic" loop>
    <source src="tahanan.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" id="musicBtn" title="Toggle music">♪</button>

<script>
const music = document.getElementById('bgMusic');
const btn = document.getElementById('musicBtn');
music.volume = 0.4;
let playing = false;

const savedTime = parseFloat(sessionStorage.getItem('musicTime') || '0');
const wasPaused = sessionStorage.getItem('musicPaused') === 'true';
music.currentTime = savedTime;

window.addEventListener('pagehide', () => {
    sessionStorage.setItem('musicTime', music.currentTime);
    sessionStorage.setItem('musicPaused', !playing);
});

if (!wasPaused) {
    music.play().then(() => {
        playing = true;
        btn.textContent = '♪';
    }).catch(() => {
        document.addEventListener('click', function startMusic() {
            music.play();
            playing = true;
            btn.textContent = '♪';
        }, { once: true });
    });
}

btn.addEventListener('click', function(e) {
    e.stopPropagation();
    if (playing) {
        music.pause();
        playing = false;
        btn.textContent = '♩';
    } else {
        music.play();
        playing = true;
        btn.textContent = '♪';
    }
});
</script>

</body>
</html>
